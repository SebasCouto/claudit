name: version-bump

# Cuando un PR se mergea a main y tocó el plugin, sube el patch en los DOS manifests
# (plugin.json + marketplace.json) y lo commitea de vuelta a main. La versión vive en
# main para que `claude plugin update` la vea.
#
# El push del bot NO re-dispara este workflow: los commits hechos con GITHUB_TOKEN no
# gatillan Actions (protección nativa de GitHub) y además llevan [skip ci].
on:
  push:
    branches: [main]
    paths:
      - "plugin/claude-code/**"

permissions:
  contents: write

jobs:
  bump:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump patch en los dos manifests
        run: python3 scripts/bump_version.py

      - name: Commit & push del bump
        run: |
          git diff --cached --quiet && { echo "nada que bumpear"; exit 0; }
          NEW=$(python3 -c "import json; print(json.load(open('plugin/claude-code/.claude-plugin/plugin.json'))['version'])")
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: bump version a $NEW [skip ci]"
          git push
